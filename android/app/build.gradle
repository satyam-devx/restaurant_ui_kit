plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '50'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '5.0'

android {
    namespace "com.jideguru.restaurant_ui_kit"
    // Using 'flutter' properties ensures compatibility with Flutter 3.22
    compileSdkVersion 34 // Upgraded from 28 to meet modern Play Store requirements

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.jideguru.restaurant_ui_kit"
        minSdkVersion 21 // Raised from 16; Flutter 3.22+ effectively requires 21
        targetSdkVersion 34 // Modernized for compatibility
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            // WARNING: Ensure you set up a real release signingConfig later!
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Isse replace karo
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22" 
    
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:runner:1.5.2'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
