name: Flutter APK Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # 🔥 IMPORTANT: recreate missing android files (gradlew fix)
      - name: Recreate missing files
        run: flutter create .

      # 🔥 Clean everything
      - name: Clean project
        run: |
          rm -f pubspec.lock
          flutter clean

      # 🔥 Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🔥 Make gradlew executable (safe)
      - name: Fix gradlew permission
        run: chmod +x android/gradlew

      # 🚀 Build APK
      - name: Build APK
        run: flutter build apk --release

      # 📦 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
