name: Flutter APK Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Clean Cache and Force Refresh
        run: |
          rm -f pubspec.lock
          flutter pub cache clean -f   # Ye line zaroori hai purani cache delete karne ke liye
          flutter clean

      - name: Install dependencies
        run: flutter pub get


      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
